<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Симулятор Дежурного</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        html, body { width: 100%; height: 100%; font-family: 'Courier New', Courier, monospace; background: #111; color: white; overflow: hidden; }

        #setup-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.98); display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; padding: 20px; overflow-y: auto;
        }

        .setup-box { background: #222; padding: 25px; border-radius: 10px; width: 100%; max-width: 450px; border: 1px solid #444; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .setup-box h2 { margin-bottom: 15px; text-align: center; font-size: 20px; color: #fff; letter-spacing: 1px; }
        .setup-box h3 { margin: 15px 0 10px 0; color: #2ecc71; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 5px; }

        .file-input-group { margin-bottom: 12px; display: flex; flex-direction: column; }
        .file-input-group label { margin-bottom: 5px; font-size: 13px; color: #ccc; }
        .file-input-group input { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        
        #start-btn {
            width: 100%; padding: 15px; background: #27ae60; color: white; border: none;
            border-radius: 5px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3); transition: background 0.2s;
        }
        #start-btn:hover { background: #219653; }

        #sign-screen-btn {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 30px; background: #e74c3c; color: white; border: 2px solid white;
            border-radius: 5px; font-size: 16px; font-weight: bold; font-family: inherit;
            cursor: pointer; z-index: 2000; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #sign-screen-btn:active { background: #c0392b; }

        #radio-alert {
            position: absolute; bottom: 30px; right: 30px; background: rgba(231, 76, 60, 0.9); 
            color: white; padding: 12px 20px; border-radius: 5px; font-weight: bold; 
            display: none; z-index: 2000; animation: blink 1s infinite; border: 1px solid white;
        }
        #radio-speech {
            position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%); 
            background: rgba(0, 0, 0, 0.85); border: 2px solid #2ecc71; padding: 15px 25px; 
            border-radius: 5px; display: none; z-index: 2000; max-width: 80%; 
            text-align: center; color: #2ecc71; font-weight: bold; font-size: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        @keyframes blink {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.15); border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%; z-index: 1000; touch-action: none; display: flex;
            align-items: center; justify-content: center;
        }
        #joystick-handle {
            width: 50px; height: 50px; background: rgba(255, 255, 255, 0.7);
            border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.05s linear; pointer-events: none;
        }
    </style>

    <script>
        AFRAME.registerComponent('info-btn', {
            schema: { type: 'number' },
            init: function () {
                this.el.addEventListener('click', () => {
                    handleInfoButton(this.data);
                    this.el.object3D.position.y -= 0.02;
                    setTimeout(() => { this.el.object3D.position.y += 0.02; }, 100);
                });
            }
        });

        AFRAME.registerComponent('semafor-btn', {
            init: function () {
                this.el.addEventListener('click', () => {
                    const audio = document.getElementById('semafor-audio');
                    if (audio) {
                        audio.currentTime = 0;
                        audio.play().catch(e => console.log(e));
                    }
                    this.el.object3D.position.z -= 0.02;
                    setTimeout(() => { this.el.object3D.position.z += 0.02; }, 150);
                });
            }
        });
    </script>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h2>Подготовка к смене</h2>
            <h3>Аудиоинформатор</h3>
            <div class="file-input-group"><label>Звук 1:</label><input type="file" id="audio1" accept="audio/*"></div>
            <div class="file-input-group"><label>Звук 2:</label><input type="file" id="audio2" accept="audio/*"></div>
            <div class="file-input-group"><label>Звук 3:</label><input type="file" id="audio3" accept="audio/*"></div>
            <audio id="racia-audio" src="Racia.mp3" preload="auto"></audio>
            <audio id="semafor-audio" src="Simafor.mp3" preload="auto"></audio>
            <button id="start-btn">Зайти в будку</button>
        </div>
    </div>

    <button id="sign-screen-btn">ПОДПИСАТЬ РАСПИСАНИЕ</button>
    <div id="radio-alert">📳 ВЫЗОВ ПО РАЦИИ (ДНЦ)</div>
    <div id="radio-speech"></div>

    <div id="joystick-zone">
        <div id="joystick-handle"></div>
    </div>

    <a-scene id="game-scene" cursor="rayOrigin: mouse" raycaster="objects: .clickable" vr-mode-ui="enabled: false">
        
        <a-assets>
            <video id="video-station" src="station.mp4" playsinline muted loop crossorigin="anonymous"></video>
            <video id="video-train" src="arrival.mp4" playsinline muted crossorigin="anonymous"></video>
            <img id="wood-texture" src="https://cdn.jsdelivr.net/gh/aframevr/sample-assets@master/assets/images/wood/hardwood2_diffuse.jpg" crossorigin="anonymous">
            
            <img id="wall-texture" src="wall.jpg" crossorigin="anonymous">
            <img id="floor-texture" src="floor.jpg" crossorigin="anonymous">
            <img id="door-texture" src="door.jpg" crossorigin="anonymous">
        </a-assets>

        <a-light id="ambient-light" type="ambient" intensity="0.5"></a-light>
        <a-light id="main-light" type="point" intensity="0.8" position="0 2.5 0"></a-light>

        <a-entity id="room">
            <a-plane position="-3.5 2 -4" width="1" height="5" src="#wall-texture" repeat="0.5 2.5"></a-plane>
            <a-plane position="3.5 2 -4" width="1" height="5" src="#wall-texture" repeat="0.5 2.5"></a-plane>
            <a-plane position="0 3.925 -4" width="6" height="1.475" src="#wall-texture" repeat="3 0.7"></a-plane>
            <a-plane position="0 -0.075 -4" width="6" height="0.825" src="#wall-texture" repeat="3 0.4"></a-plane>

            <a-plane position="0 2 4" rotation="0 180 0" width="8" height="5" src="#wall-texture" repeat="4 2.5"></a-plane> 
            <a-plane position="-4 2 0" rotation="0 90 0" width="8" height="5" src="#wall-texture" repeat="4 2.5"></a-plane> 
            <a-box position="-3.95 0.6 1.5" rotation="0 90 0" width="1.0" height="2.2" depth="0.05" src="#door-texture">
                <a-sphere position="0.4 0 -0.04" radius="0.03" color="#d4af37"></a-sphere>
            </a-box>

            <a-entity position="-3.94 1.2 0.7" rotation="0 90 0">
                <a-box width="0.2" height="0.25" depth="0.05" color="#555555"></a-box>
                <a-cylinder semafor-btn class="clickable" position="0 0 0.03" rotation="90 0 0" radius="0.06" height="0.04" color="#ff0000"></a-cylinder>
            </a-entity>

            <a-plane position="4 2 0" rotation="0 -90 0" width="8" height="5" src="#wall-texture" repeat="4 2.5"></a-plane> 
            <a-plane position="0 -0.5 0" rotation="-90 0 0" width="8" height="8" src="#floor-texture" repeat="4 4"></a-plane> 
            <a-plane position="0 4.5 0" rotation="90 0 0" width="8" height="8" color="#edf2f4"></a-plane>
        </a-entity>

        <a-video id="main-video-screen" src="#video-station" width="6" height="3.375" position="0 1.5 -3.95"></a-video>
        <a-plane position="0 1.5 -3.93" width="6" height="3.375" color="#a0c4ff" opacity="0.15" material="transparent: true; metalness: 0.8; roughness: 0.1"></a-plane>
        
        <a-box position="0 3.2 -3.9" width="6.2" height="0.1" depth="0.1" color="#2b2d42"></a-box>
        <a-box position="0 -0.2 -3.9" width="6.2" height="0.1" depth="0.1" color="#2b2d42"></a-box>
        <a-box position="-3.05 1.5 -3.9" width="0.1" height="3.4" depth="0.1" color="#2b2d42"></a-box>
        <a-box position="3.05 1.5 -3.9" width="0.1" height="3.4" depth="0.1" color="#2b2d42"></a-box>

        <a-entity id="traffic-light-system" position="2.2 1.3 -3.85">
            <a-cylinder radius="0.02" height="1.8" color="#333" position="0 -0.4 0"></a-cylinder>
            <a-box width="0.25" height="0.5" depth="0.05" color="#111" position="0 0.3 0"></a-box>
            <a-cylinder position="0 0.42 0.03" rotation="90 0 0" radius="0.07" height="0.06" color="#000" theta-length="180"></a-cylinder>
            <a-cylinder position="0 0.18 0.03" rotation="90 0 0" radius="0.07" height="0.06" color="#000" theta-length="180"></a-cylinder>
            <a-cylinder id="tl-red-light" position="0 0.42 0.03" rotation="90 0 0" radius="0.06" height="0.02" color="#ff0000" material="emissive: #ff0000; emissiveIntensity: 1"></a-cylinder>
            <a-cylinder id="tl-green-light" position="0 0.18 0.03" rotation="90 0 0" radius="0.06" height="0.02" color="#003300" material="emissive: #00ff00; emissiveIntensity: 0"></a-cylinder>
        </a-entity>

        <a-entity id="desk">
            <a-box position="0 0.8 -1.2" width="3" height="0.1" depth="1.2" src="#wood-texture" repeat="2 1"></a-box>
            <a-cylinder position="-1.4 0.15 -1.7" radius="0.04" height="1.2" src="#wood-texture"></a-cylinder>
            <a-cylinder position="1.4 0.15 -1.7" radius="0.04" height="1.2" src="#wood-texture"></a-cylinder>
            <a-cylinder position="-1.4 0.15 -0.7" radius="0.04" height="1.2" src="#wood-texture"></a-cylinder>
            <a-cylinder position="1.4 0.15 -0.7" radius="0.04" height="1.2" src="#wood-texture"></a-cylinder>
        </a-entity>

        <a-entity position="0 0.88 -0.9" rotation="-20 0 0">
            <a-box width="0.35" height="0.05" depth="0.2" color="#2c3e50"></a-box>
            <a-text value="СВЕТОФОР Ч1" color="#f1c40f" align="center" position="0 0.03 -0.05" scale="0.35 0.35 0.35" rotation="-90 0 0"></a-text>
            <a-cylinder class="clickable tl-btn-red" position="-0.08 0.03 0.03" radius="0.03" height="0.03" color="#e74c3c"></a-cylinder>
            <a-cylinder class="clickable tl-btn-green" position="0.08 0.03 0.03" radius="0.03" height="0.03" color="#2ecc71"></a-cylinder>
        </a-entity>

        <a-entity position="-0.4 1.0 -1.4" rotation="15 0 0">
            <a-box width="0.8" height="0.1" depth="0.4" color="#4a5568"></a-box>
            <a-cylinder class="clickable" info-btn="1" position="-0.25 0.05 -0.05" radius="0.06" height="0.05" color="#2ecc71"></a-cylinder>
            <a-cylinder class="clickable" info-btn="2" position="0 0.05 -0.05" radius="0.06" height="0.05" color="#2ecc71"></a-cylinder>
            <a-cylinder class="clickable" info-btn="3" position="0.25 0.05 -0.05" radius="0.06" height="0.05" color="#2ecc71"></a-cylinder>
        </a-entity>

        <a-entity id="table-schedule" class="clickable" position="0.8 0.86 -1.0" rotation="-90 -15 0">
            <a-plane width="0.3" height="0.45" color="#fdfbf7"></a-plane>
            <a-text value="SCHEDULE: 
                        10:41 Kaliningrad-Mamonovo,
                        17:11 Mamonovo-Kaliningrad" 
                    color="#111" align="center" position="0 0.05 0.01" scale="0.6 0.6 0.6" width="0.6"></a-text>
            <a-text id="table-sig" value="НЕ ПОДПИСАНО" color="#ff0000" align="center" position="0 -0.15 0.01" scale="0.4 0.4 0.4" width="0.6"></a-text>
        </a-entity>

        <a-box id="table-radio" class="clickable" position="-1.0 0.95 -1.1" rotation="0 30 0" width="0.12" height="0.25" depth="0.06" color="#1a1a1a">
            <a-cylinder position="-0.03 0.18 0" radius="0.01" height="0.15" color="#000"></a-cylinder>
            <a-cylinder position="0 0.05 0.03" rotation="90 0 0" radius="0.02" height="0.01" color="#e74c3c"></a-cylinder>
        </a-box>

        <a-entity id="camera-rig" position="0 0.8 0.5" rotation="0 0 0">
            <a-camera id="main-camera" position="0 0.4 0" look-controls="magicWindowTrackingEnabled: false; touchEnabled: true; pointerLockEnabled: false">
                
                <a-entity id="hand-schedule" class="clickable" position="0 -0.2 -0.4" rotation="10 0 0" visible="false">
                    <a-plane width="0.3" height="0.45" color="#fdfbf7"></a-plane>
                    <a-text value="SCHEDULE: 
                        10:41 Kaliningrad-Mamonovo,
                        17:11 Mamonovo-Kaliningrad" 
                            color="#111" align="center" position="0 0.05 0.01" scale="0.6 0.6 0.6" width="0.6"></a-text>
                    <a-text id="hand-sig" value="НЕ ПОДПИСАНО" color="#ff0000" align="center" position="0 -0.15 0.01" scale="0.4 0.4 0.4" width="0.6"></a-text>
                </a-entity>

                <a-entity id="hand-radio" position="0.3 -0.35 -0.5" rotation="0 -20 0" visible="false">
                    <a-box id="hand-radio-body" class="clickable" width="0.12" height="0.25" depth="0.06" color="#1a1a1a"></a-box>
                    <a-cylinder id="hand-radio-btn" class="clickable" position="0 0.05 0.035" rotation="90 0 0" radius="0.02" height="0.015" color="#e74c3c"></a-cylinder>
                </a-entity>
            </a-camera>
        </a-entity>
    </a-scene>

    <script>
        let audioFiles = { 1: null, 2: null, 3: null };
        const setupScreen = document.getElementById('setup-screen');
        const signBtn = document.getElementById('sign-screen-btn');
        const screenVideo = document.getElementById('main-video-screen');
        const videoStation = document.getElementById('video-station');
        const videoTrain = document.getElementById('video-train');
        const raciaAudio = document.getElementById('racia-audio');
        
        const cameraRig = document.getElementById('camera-rig');
        const mainCamera = document.getElementById('main-camera');
        
        const tableRadio = document.getElementById('table-radio');
        const handRadio = document.getElementById('hand-radio');
        const handRadioBody = document.getElementById('hand-radio-body');
        const handRadioBtn = document.getElementById('hand-radio-btn');
        
        const tableSchedule = document.getElementById('table-schedule');
        const handSchedule = document.getElementById('hand-schedule');
        const tableSig = document.getElementById('table-sig');
        const handSig = document.getElementById('hand-sig');
        let isSigned = false;

        let isCallIncoming = false;
        let currentMessageIndex = 0;
        const dispatcherMessages = [
            "ДНЦ: Дежурный Мамоново! К вам со стороны Калининграда отправлен грузовой №2801. Готовьте 2-й путь приема.",
            "ДНЦ: Мамоново, я ДНЦ. Пригородный поезд 6304 следует графиком. Принимайте на 1-й путь, не задерживайте.",
            "ДНЦ: Внимание, Мамоново! На перегоне ведутся незапланированные путевые работы. Будьте бдительны.",
            "ДНЦ: Дежурный, как приняли смену? Документы подписали? Закрепление на 4-м пути проверьте и доложите."
        ];

        // ЛОГИКА СВЕТОФОРА (Исправлена область видимости click)
        const tlRedLight = document.getElementById('tl-red-light');
        const tlGreenLight = document.getElementById('tl-green-light');

        document.querySelectorAll('.tl-btn-red').forEach(btn => {
            btn.addEventListener('click', () => {
                const el = btn.object3D;
                el.position.y -= 0.015;
                setTimeout(() => { el.position.y += 0.015; }, 150);

                tlRedLight.setAttribute('color', '#ff0000');
                tlRedLight.setAttribute('material', 'emissive: #ff0000; emissiveIntensity: 1');
                tlGreenLight.setAttribute('color', '#003300');
                tlGreenLight.setAttribute('material', 'emissive: #00ff00; emissiveIntensity: 0');
            });
        });

        document.querySelectorAll('.tl-btn-green').forEach(btn => {
            btn.addEventListener('click', () => {
                const el = btn.object3D;
                el.position.y -= 0.015;
                setTimeout(() => { el.position.y += 0.015; }, 150);

                tlRedLight.setAttribute('color', '#330000');
                tlRedLight.setAttribute('material', 'emissive: #ff0000; emissiveIntensity: 0');
                tlGreenLight.setAttribute('color', '#2ecc71');
                tlGreenLight.setAttribute('material', 'emissive: #2ecc71; emissiveIntensity: 1');
            });
        });

        // ЛОГИКА ВИРТУАЛЬНОГО ДЖОЙСТИКА
        const joystickZone = document.getElementById('joystick-zone');
        const joystickHandle = document.getElementById('joystick-handle');
        
        let joystickActive = false;
        let moveX = 0;
        let moveZ = 0;
        const maxDistance = 50; 
        const speed = 0.04; 

        function handleJoystickStart(e) {
            joystickActive = true;
            handleJoystickMove(e);
        }

        function handleJoystickMove(e) {
            if (!joystickActive) return;
            const touch = e.touches ? e.touches[0] : e;
            const rect = joystickZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let deltaX = touch.clientX - centerX;
            let deltaY = touch.clientY - centerY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            if (distance > maxDistance) {
                deltaX = (deltaX / distance) * maxDistance;
                deltaY = (deltaY / distance) * maxDistance;
            }

            joystickHandle.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
            
            moveX = deltaX / maxDistance;
            moveZ = deltaY / maxDistance;
        }

        function handleJoystickEnd() {
            joystickActive = false;
            moveX = 0;
            moveZ = 0;
            joystickHandle.style.transform = 'translate(0px, 0px)';
        }

        joystickZone.addEventListener('touchstart', handleJoystickStart);
        window.addEventListener('touchmove', handleJoystickMove);
        window.addEventListener('touchend', handleJoystickEnd);

        joystickZone.addEventListener('mousedown', handleJoystickStart);
        window.addEventListener('mousemove', handleJoystickMove);
        window.addEventListener('mouseup', handleJoystickEnd);

        function updateMovement() {
            if (joystickActive && (moveX !== 0 || moveZ !== 0)) {
                const rotation = mainCamera.getAttribute('rotation');
                const angle = (rotation.y * Math.PI) / 180;

                const forwardX = -Math.sin(angle);
                const forwardZ = -Math.cos(angle);
                
                const sideX = Math.cos(angle);
                const sideZ = -Math.sin(angle);

                const dirForward = -moveZ;
                const dirRight = moveX;

                const dx = (forwardX * dirForward + sideX * dirRight) * speed;
                const dz = (forwardZ * dirForward + sideZ * dirRight) * speed;

                const pos = cameraRig.getAttribute('position');
                
                const nextX = Math.max(-3.5, Math.min(3.5, pos.x + dx));
                const nextZ = Math.max(-3.5, Math.min(3.5, pos.z + dz));

                cameraRig.setAttribute('position', `${nextX} ${pos.y} ${nextZ}`);
            }
            requestAnimationFrame(updateMovement);
        }
        requestAnimationFrame(updateMovement);

        document.getElementById('audio1').addEventListener('change', (e) => { if(e.target.files[0]) audioFiles[1] = new Audio(URL.createObjectURL(e.target.files[0])); });
        document.getElementById('audio2').addEventListener('change', (e) => { if(e.target.files[0]) audioFiles[2] = new Audio(URL.createObjectURL(e.target.files[0])); });
        document.getElementById('audio3').addEventListener('change', (e) => { if(e.target.files[0]) audioFiles[3] = new Audio(URL.createObjectURL(e.target.files[0])); });

        function triggerIncomingCall() {
            if (isCallIncoming) return;
            isCallIncoming = true;
            document.getElementById('radio-alert').style.display = 'block';
        }

        signBtn.addEventListener('click', () => {
            isSigned = true;
            tableSig.setAttribute('value', 'Принято (Подпись: ДСП) ✓');
            tableSig.setAttribute('color', '#27ae60');
            handSig.setAttribute('value', 'Принято (Подпись: ДСП) ✓');
            handSig.setAttribute('color', '#27ae60');
            signBtn.style.display = 'none';

            handSchedule.setAttribute('visible', false);
            handSchedule.classList.remove('clickable');
            tableSchedule.setAttribute('visible', true);
            tableSchedule.classList.add('clickable');
        });

        tableSchedule.addEventListener('click', () => {
            tableSchedule.setAttribute('visible', false);
            tableSchedule.classList.remove('clickable');
            handSchedule.setAttribute('visible', true);
            handSchedule.classList.add('clickable');
            if (!isSigned) signBtn.style.display = 'block';
        });

        handSchedule.addEventListener('click', () => {
            handSchedule.setAttribute('visible', false);
            handSchedule.classList.remove('clickable');
            signBtn.style.display = 'none';
            tableSchedule.setAttribute('visible', true);
            tableSchedule.classList.add('clickable');
        });

        tableRadio.addEventListener('click', () => {
            tableRadio.setAttribute('visible', false);
            tableRadio.classList.remove('clickable');
            
            handRadio.setAttribute('visible', true);
            handRadioBody.classList.add('clickable');
            handRadioBtn.classList.add('clickable');
        });

        handRadioBody.addEventListener('click', () => {
            handRadio.setAttribute('visible', false);
            handRadioBody.classList.remove('clickable');
            handRadioBtn.classList.remove('clickable');
            
            tableRadio.setAttribute('visible', true);
            tableRadio.classList.add('clickable');
        });

        handRadioBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            if(raciaAudio) {
                raciaAudio.currentTime = 0;
                raciaAudio.play().catch(err => console.log(err));
            }

            const speechBubble = document.getElementById('radio-speech');
            speechBubble.style.display = 'block';

            if (isCallIncoming) {
                speechBubble.innerText = dispatcherMessages[currentMessageIndex];
                speechBubble.style.borderColor = '#2ecc71';
                speechBubble.style.color = '#2ecc71';

                isCallIncoming = false;
                document.getElementById('radio-alert').style.display = 'none';
                currentMessageIndex = (currentMessageIndex + 1) % dispatcherMessages.length;

                setTimeout(triggerIncomingCall, 35000);
            } else {
                speechBubble.innerText = "Рация: (в эфире слышны фоновые шумы депо и далекий стук колес...)";
                speechBubble.style.borderColor = '#7f8c8d';
                speechBubble.style.color = '#7f8c8d';
            }

            setTimeout(() => {
                speechBubble.style.display = 'none';
            }, 6000);
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            setupScreen.style.display = 'none';
            
            if (videoStation) {
                videoStation.muted = true;
                videoStation.play().then(() => {
                    if (screenVideo) screenVideo.setAttribute('src', '#video-station');
                }).catch(e => {
                    console.log("Видео заблокировано браузером. Требуется клик по экрану:", e);
                });
            }
            setTimeout(triggerIncomingCall, 7000);
        });

        function handleInfoButton(num) {
            if (audioFiles[num]) { 
                audioFiles[num].currentTime = 0; 
                audioFiles[num].play().catch(e => {}); 
            }
            if (screenVideo && videoTrain) {
                screenVideo.setAttribute('src', '#video-train');
                videoTrain.currentTime = 0;
                videoTrain.muted = true; 
                videoTrain.play().catch(e => {});
            }
        }

        if (videoTrain) {
            videoTrain.addEventListener('ended', () => {
                if (screenVideo && videoStation) {
                    screenVideo.setAttribute('src', '#video-station');
                    videoStation.play().catch(e => {});
                }
            });
        }
    </script>
</body>
</html>
